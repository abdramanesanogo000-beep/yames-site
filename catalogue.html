<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="yames.css">
    <script src="yames.js" defer></script>
    <title>Catalogue - Yames</title>
</head>

<body>
    <nav>
        <div class="nav-left">
            <a href="index.html">
                <img src="logo yames.png" alt="logo de yames">
            </a>
        </div>
        <div class="nav-center">
            <a href="index.html">Accueil</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="professionnels.html">Professionnels</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <form action="/recherche" method="GET">
                <label for="search-input">Rechercher</label>
                <input type="search" id="search-input" name="q" placeholder="Rechercher sur le site...">
                <button type="submit">🔍</button>
            </form>

            <a href="connexion.html" class="nav-compte-link">Connexion</a>

            <a href="panier.html">Panier <span id="cart-count">0</span></a>
        </div>
    </nav>


    <main>

        <section class="catalogue-page">
            <h1>Notre catalogue</h1>

            <div class="catalogue-layout">

                <aside class="filters">
                    <h2>Filtres</h2>

                    <div class="filter-group">
                        <h3>Catégorie</h3>
                        <div class="filter-boxes">
                            <label class="filter-box">
                                <input type="checkbox" class="filter-categorie" value="clinique">
                                <span>Équipement médical</span>
                            </label>
                            <label class="filter-box">
                                <input type="checkbox" class="filter-categorie" value="consommable">
                                <span>Consommables</span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h3>Produit</h3>
                        <div class="filter-boxes filter-product-boxes">
                            <button type="button" class="filter-box-btn active" data-produit-filter="tous">Tous les
                                produits</button>
                            <button type="button" class="filter-box-btn" data-produit-filter="promo">En promo</button>
                            <button type="button" class="filter-box-btn" data-produit-filter="stock">En stock</button>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h3>Prix (FCFA)</h3>
                        <label>Min : <input type="number" id="prix-min" placeholder="0" min="0" step="any"
                                style="-moz-appearance: textfield;"></label>
                        <label>Max : <input type="number" id="prix-max" placeholder="300000" min="0" step="any"
                                style="-moz-appearance: textfield;"></label>
                    </div>

                    <div class="filter-group">
                        <h3>Trier par</h3>
                        <select id="tri-select">
                            <option value="defaut">Par défaut</option>
                            <option value="prix-asc">Prix croissant</option>
                            <option value="prix-desc">Prix décroissant</option>
                            <option value="nom-asc">Nom (A-Z)</option>
                        </select>
                    </div>

                    <button id="reset-filtres" class="btn-reset">Réinitialiser</button>
                </aside>

                <div class="product-grid" id="product-container">

                </div>

            </div>
        </section>

    </main>

    <footer>
        <div class="footer-socials">
            <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer">facebook</a>
            <a href="https://www.tiktok.com/fr/" target="_blank" rel="noopener noreferrer">tiktok</a>
        </div>
        <p>&copy; 2026 Yames. Tous droits réservés.</p>
    </footer>

</body>

</html>
